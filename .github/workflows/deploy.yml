name: Build and Deploy to DigitalOcean

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            knoweb main/package-lock.json
            Ginuma_new_updates/ginum-frontend-main/package-lock.json
            Knoweb_inventory/inventory-frontend/package-lock.json
            subscription-service/frontend/package-lock.json

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build Spring Boot Services
      - name: Build ginuma-service
        working-directory: Ginuma_new_updates/ginum-backend-main
        run: |
          mvn clean package -DskipTests
          docker build -t ${{ secrets.DOCKER_USERNAME }}/ginuma-service:latest --build-arg JAR_FILE=target/*.jar -f Dockerfile .
          docker push ${{ secrets.DOCKER_USERNAME }}/ginuma-service:latest

      - name: Build api-gateway
        working-directory: Knoweb_inventory/api-gateway
        run: |
          mvn clean package -DskipTests
          cp target/*.jar target/app.jar
          docker build -t ${{ secrets.DOCKER_USERNAME }}/api-gateway:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/api-gateway:latest

      - name: Build catalog-service
        working-directory: Knoweb_inventory/catalog-service
        run: |
          mvn clean package -DskipTests
          cp target/*.jar target/app.jar
          docker build -t ${{ secrets.DOCKER_USERNAME }}/catalog-service:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/catalog-service:latest

      - name: Build identity-service
        working-directory: Knoweb_inventory/identity-service
        run: |
          mvn clean package -DskipTests
          cp target/*.jar target/app.jar
          docker build -t ${{ secrets.DOCKER_USERNAME }}/identity-service:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/identity-service:latest

      - name: Build inventory-service
        working-directory: Knoweb_inventory/inventory-service
        run: |
          mvn clean package -DskipTests
          cp target/*.jar target/app.jar
          docker build -t ${{ secrets.DOCKER_USERNAME }}/inventory-service:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/inventory-service:latest

      - name: Build notification-service
        working-directory: Knoweb_inventory/notification-service
        run: |
          mvn clean package -DskipTests
          cp target/*.jar target/app.jar
          docker build -t ${{ secrets.DOCKER_USERNAME }}/notification-service:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/notification-service:latest

      - name: Build order-service
        working-directory: Knoweb_inventory/order-service
        run: |
          mvn clean package -DskipTests
          cp target/*.jar target/app.jar
          docker build -t ${{ secrets.DOCKER_USERNAME }}/order-service:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/order-service:latest

      - name: Build product-service
        working-directory: Knoweb_inventory/product-service
        run: |
          mvn clean package -DskipTests
          cp target/*.jar target/app.jar
          docker build -t ${{ secrets.DOCKER_USERNAME }}/product-service:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/product-service:latest

      - name: Build reporting-service
        working-directory: Knoweb_inventory/reporting-service
        run: |
          mvn clean package -DskipTests
          cp target/*.jar target/app.jar
          docker build -t ${{ secrets.DOCKER_USERNAME }}/reporting-service:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/reporting-service:latest

      - name: Build service-discovery
        working-directory: Knoweb_inventory/service-discovery
        run: |
          mvn clean package -DskipTests
          cp target/*.jar target/app.jar
          docker build -t ${{ secrets.DOCKER_USERNAME }}/service-discovery:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/service-discovery:latest

      - name: Build supplier-service
        working-directory: Knoweb_inventory/supplier-service
        run: |
          mvn clean package -DskipTests
          cp target/*.jar target/app.jar
          docker build -t ${{ secrets.DOCKER_USERNAME }}/supplier-service:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/supplier-service:latest

      - name: Build user-service
        working-directory: Knoweb_inventory/user-service
        run: |
          mvn clean package -DskipTests
          cp target/*.jar target/app.jar
          docker build -t ${{ secrets.DOCKER_USERNAME }}/user-service:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/user-service:latest

      - name: Build warehouse-service
        working-directory: Knoweb_inventory/warehouse-service
        run: |
          mvn clean package -DskipTests
          cp target/*.jar target/app.jar
          docker build -t ${{ secrets.DOCKER_USERNAME }}/warehouse-service:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/warehouse-service:latest

      - name: Build subscription-service
        working-directory: subscription-service/backend
        run: |
          mvn clean package -DskipTests
          docker build -t ${{ secrets.DOCKER_USERNAME }}/subscription-service:latest --build-arg JAR_FILE=target/*.jar -f Dockerfile .
          docker push ${{ secrets.DOCKER_USERNAME }}/subscription-service:latest

      # Build Frontend Applications
      - name: Build knoweb-main frontend
        working-directory: knoweb main
        run: |
          npm ci --include=optional
          npm install --no-save @rollup/rollup-linux-x64-gnu
          npm run build
          docker build -t ${{ secrets.DOCKER_USERNAME }}/knoweb-main:latest -f Dockerfile .
          docker push ${{ secrets.DOCKER_USERNAME }}/knoweb-main:latest

      - name: Build ginuma-frontend
        working-directory: Ginuma_new_updates/ginum-frontend-main
        run: |
          npm ci --include=optional
          npm install --no-save @rollup/rollup-linux-x64-gnu
          npm run build
          docker build -t ${{ secrets.DOCKER_USERNAME }}/ginuma-frontend:latest -f Dockerfile .
          docker push ${{ secrets.DOCKER_USERNAME }}/ginuma-frontend:latest

      - name: Build inventory-frontend
        working-directory: Knoweb_inventory/inventory-frontend
        run: |
          npm ci --include=optional
          npm install --no-save @rollup/rollup-linux-x64-gnu
          npm run build
          docker build -t ${{ secrets.DOCKER_USERNAME }}/inventory-frontend:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/inventory-frontend:latest

      - name: Build subscription-frontend
        working-directory: subscription-service/frontend
        run: |
          npm ci --include=optional
          npm install --no-save @rollup/rollup-linux-x64-gnu
          npm run build
          docker build -t ${{ secrets.DOCKER_USERNAME }}/subscription-frontend:latest -f Dockerfile .
          docker push ${{ secrets.DOCKER_USERNAME }}/subscription-frontend:latest

      # Deploy to DigitalOcean
      - name: Copy compose files to droplet
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          key: ${{ secrets.DO_SSH_KEY }}
          source: "docker-compose.yml,init.sql"
          target: "/app/"

      - name: Deploy to DigitalOcean
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            cd /app
            docker compose pull
            docker compose up -d
            docker system prune -af
