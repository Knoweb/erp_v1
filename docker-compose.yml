services:
  # MySQL Database
  mysql:
    image: mysql:8
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: 1234
    volumes:
      - ./mysql-data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3306:3306"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Service Discovery (Eureka)
  service-discovery:
    image: ${DOCKER_USERNAME}/service-discovery:latest
    container_name: service-discovery
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    ports:
      - "8761:8761"
    networks:
      - app-network
    restart: unless-stopped

  # Identity Service
  identity-service:
    image: ${DOCKER_USERNAME}/identity-service:latest
    container_name: identity-service
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/identity_db?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_JDBC_URL=jdbc:mysql://mysql:3306/identity_db?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=1234
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-discovery:8761/eureka/
      - SUBSCRIPTION_DATASOURCE_URL=jdbc:mysql://mysql:3306/subscription_db?createDatabaseIfNotExist=true
      - SUBSCRIPTION_DATASOURCE_JDBC_URL=jdbc:mysql://mysql:3306/subscription_db?createDatabaseIfNotExist=true
      - SUBSCRIPTION_DATASOURCE_USERNAME=root
      - SUBSCRIPTION_DATASOURCE_PASSWORD=1234
    ports:
      - "8088:8088"
    depends_on:
      mysql:
        condition: service_healthy
      service-discovery:
        condition: service_started
    networks:
      - app-network
    restart: unless-stopped

  # Ginuma Service
  ginuma-service:
    image: ${DOCKER_USERNAME}/ginuma-service:latest
    container_name: ginuma-service
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/ginum_apps?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=1234
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-discovery:8761/eureka/
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy
      service-discovery:
        condition: service_started
    networks:
      - app-network
    restart: unless-stopped

  # Product Service
  product-service:
    image: ${DOCKER_USERNAME}/product-service:latest
    container_name: product-service
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/product_db?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=1234
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-discovery:8761/eureka/
    ports:
      - "8092:8081"
    depends_on:
      mysql:
        condition: service_healthy
      service-discovery:
        condition: service_started
    networks:
      - app-network
    restart: unless-stopped

  # Inventory Service
  inventory-service:
    image: ${DOCKER_USERNAME}/inventory-service:latest
    container_name: inventory-service
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/inventory_db?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=1234
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-discovery:8761/eureka/
    ports:
      - "8082:8082"
    depends_on:
      mysql:
        condition: service_healthy
      service-discovery:
        condition: service_started
    networks:
      - app-network
    restart: unless-stopped

  # Order Service
  order-service:
    image: ${DOCKER_USERNAME}/order-service:latest
    container_name: order-service
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/order_db?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=1234
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-discovery:8761/eureka/
      - INVENTORY_SERVICE_URL=http://inventory-service:8082
    ports:
      - "8083:8083"
    depends_on:
      mysql:
        condition: service_healthy
      service-discovery:
        condition: service_started
    networks:
      - app-network
    restart: unless-stopped

  # Warehouse Service
  warehouse-service:
    image: ${DOCKER_USERNAME}/warehouse-service:latest
    container_name: warehouse-service
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/warehouse_db?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=1234
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-discovery:8761/eureka/
      - USER_SERVICE_URL=http://user-service:8086
    ports:
      - "8084:8084"
    depends_on:
      mysql:
        condition: service_healthy
      service-discovery:
        condition: service_started
    networks:
      - app-network
    restart: unless-stopped

  # Supplier Service
  supplier-service:
    image: ${DOCKER_USERNAME}/supplier-service:latest
    container_name: supplier-service
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/supplier_db?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=1234
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-discovery:8761/eureka/
    ports:
      - "8085:8085"
    depends_on:
      mysql:
        condition: service_healthy
      service-discovery:
        condition: service_started
    networks:
      - app-network
    restart: unless-stopped

  # User Service
  user-service:
    image: ${DOCKER_USERNAME}/user-service:latest
    container_name: user-service
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/user_db?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=1234
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-discovery:8761/eureka/
    ports:
      - "8086:8086"
    depends_on:
      mysql:
        condition: service_healthy
      service-discovery:
        condition: service_started
    networks:
      - app-network
    restart: unless-stopped

  # Notification Service
  notification-service:
    image: ${DOCKER_USERNAME}/notification-service:latest
    container_name: notification-service
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/notification_db?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=1234
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-discovery:8761/eureka/
    ports:
      - "8087:8087"
    depends_on:
      mysql:
        condition: service_healthy
      service-discovery:
        condition: service_started
    networks:
      - app-network
    restart: unless-stopped

  # Catalog Service
  catalog-service:
    image: ${DOCKER_USERNAME}/catalog-service:latest
    container_name: catalog-service
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/catalog_db?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=1234
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-discovery:8761/eureka/
    ports:
      - "8089:8089"
    depends_on:
      mysql:
        condition: service_healthy
      service-discovery:
        condition: service_started
    networks:
      - app-network
    restart: unless-stopped

  # Reporting Service
  reporting-service:
    image: ${DOCKER_USERNAME}/reporting-service:latest
    container_name: reporting-service
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/reporting_db?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=1234
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-discovery:8761/eureka/
    ports:
      - "8090:8090"
    depends_on:
      mysql:
        condition: service_healthy
      service-discovery:
        condition: service_started
    networks:
      - app-network
    restart: unless-stopped

  # Subscription Service
  subscription-service:
    image: ${DOCKER_USERNAME}/subscription-service:latest
    container_name: subscription-service
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/subscription_db?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=1234
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-discovery:8761/eureka/
    ports:
      - "8091:8091"
    depends_on:
      mysql:
        condition: service_healthy
      service-discovery:
        condition: service_started
    networks:
      - app-network
    restart: unless-stopped

  # API Gateway
  api-gateway:
    image: ${DOCKER_USERNAME}/api-gateway:latest
    container_name: api-gateway
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-discovery:8761/eureka/
    ports:
      - "8080:8080"
    depends_on:
      - service-discovery
      - identity-service
      - ginuma-service
      - product-service
      - inventory-service
    networks:
      - app-network
    restart: unless-stopped

  # Frontend Applications
  knoweb-main:
    image: ${DOCKER_USERNAME}/knoweb-main:latest
    container_name: knoweb-main
    ports:
      - "3000:80"
    networks:
      - app-network
    restart: unless-stopped

  ginuma-frontend:
    image: ${DOCKER_USERNAME}/ginuma-frontend:latest
    container_name: ginuma-frontend
    ports:
      - "3001:80"
    networks:
      - app-network
    restart: unless-stopped

  inventory-frontend:
    image: ${DOCKER_USERNAME}/inventory-frontend:latest
    container_name: inventory-frontend
    ports:
      - "3002:80"
    networks:
      - app-network
    restart: unless-stopped

  subscription-frontend:
    image: ${DOCKER_USERNAME}/subscription-frontend:latest
    container_name: subscription-frontend
    ports:
      - "3003:80"
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge

volumes:
  mysql-data:
